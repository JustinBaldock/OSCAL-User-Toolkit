[tool.ruff]
target-version = "py310"

[tool.ruff.lint]
# F = pyflakes correctness checks (unused imports/vars, undefined names) —
# real bugs, not style. E7/E9 = statement-level and syntax errors (e.g.
# multiple statements on one line), also correctness rather than style.
# Deliberately NOT the full E/W pycodestyle style set (line length,
# whitespace, etc.) — this codebase's existing style runs longer lines than
# pycodestyle's defaults allow, and reformatting everything just to satisfy
# an arbitrary width isn't worth the churn. Can be tightened later if
# wanted — see todo.md for the CI rollout this belongs to.
select = ["F", "E7", "E9"]

[tool.pytest.ini_options]
testpaths = ["tests"]
