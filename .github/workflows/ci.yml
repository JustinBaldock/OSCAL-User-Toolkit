name: CI

on:
  push:
    branches: [main]
  pull_request:

# Neither job writes anything (no PR comments, releases, or pushes) — they
# only check out code and run lint/tests, so read-only access is all the
# GITHUB_TOKEN needs. Without this, the token defaults to broader
# permissions than either job actually uses.
permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      - run: ruff check .

  test:
    name: Unit tests (pytest)
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - run: pip install -r requirements-dev.txt
      # jsonschema/python-docx are optional at runtime (models.py degrades
      # gracefully without them — see README.md#requirements), but installing
      # them here means the tests actually exercise those code paths instead
      # of always hitting the "not installed" branch.
      - run: pip install jsonschema python-docx
      - run: pytest
